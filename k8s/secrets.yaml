# Dual Database Manager - Kubernetes Secret
#
# Replace all placeholders with your real values before deploying.
# See secrets.yaml.example for detailed documentation on each field.
# Do NOT commit real credentials — this file is in .gitignore when it contains secrets.
#
apiVersion: v1
kind: Secret
metadata:
  name: dual-db-secrets
  namespace: <NAMESPACE>
  labels:
    app: dual-db-manager
type: Opaque
stringData:
  # Base64-encoded JSON — see secrets.yaml.example for full structure with all fields
  # including: publicationName, subscriptionName, slack config
  DATABASE_CONFIGS: |
    <BASE64_ENCODED_DATABASE_CONFIGS_JSON>

  # Base64-encoded JSON — omit to disable ClickHouse sync feature
  CLICKHOUSE_CONFIGS: |
    <BASE64_ENCODED_CLICKHOUSE_CONFIGS_JSON>

  # Base64-encoded JSON — omit to disable Redis Manager feature
  REDIS_CONFIGS: |
    <BASE64_ENCODED_REDIS_CONFIGS_JSON>

  SESSION_SECRET: "REPLACE_WITH_LONG_RANDOM_SESSION_SECRET"
