name: Build and Push Images

# Builds the backend + frontend Docker images (linux/amd64) and pushes them to
# the GitHub Container Registry (ghcr.io), authenticated with the built-in
# GITHUB_TOKEN — no external cloud credentials or account identifiers required.
#
# Images:
#   ghcr.io/<owner>/<repo>/dual-db-backend
#   ghcr.io/<owner>/<repo>/dual-db-frontend
# Tags: v<package.json version>, <short-sha>, and (on main) latest.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-and-push.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        run: |
          VERSION="v$(node -p "require('./${{ matrix.component }}/package.json').version")"
          REGISTRY_PATH="ghcr.io/${GITHUB_REPOSITORY,,}/dual-db-${{ matrix.component }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY_PATH}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', steps.meta.outputs.image) || '' }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max
